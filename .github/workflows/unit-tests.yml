# This workflow will install Python dependencies, run tests and lint with a variety of Python versions 
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Unit tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]
        os: [ windows-latest, ubuntu-latest ]

    steps:
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install dependencies
        run: |
          uv sync --dev
      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check . --select=E9,F63,F7,F82 --statistics --exclude=.venv,build,dist
          # Check all rules with warnings
          ruff check . --exit-zero --statistics --exclude=.venv,build,dist
      - name: Test with Pytest
        run: |
          # Install shelxl
          mkdir -p ${HOME}/.local/bin
          echo ${HOME}/.local/bin >> $GITHUB_PATH
          curl -o ${HOME}/.local/bin/shelxl https://dkratzert.de/files/shelx/shelxl
          chmod a+x ${HOME}/.local/bin/shelxl
          # run tests
          pytest .
